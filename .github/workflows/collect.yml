name: Weekly Ecosystem Metrics

on:
  push:                    # runs on every push (good for testing!)
  schedule:
    - cron: '0 6 * * 1'   # every Monday 6am UTC
  workflow_dispatch:        # manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # needed to commit data back to repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Bowtie
        uses: bowtie-json-schema/bowtie@2026.3.1

      - name: Run Bowtie compliance tests
        run: |
          bowtie suite \
            --dialect draft2020-12 \
            -i js-ajv \
            -i python-jsonschema \
            -i js-hyperjump \
            -i rust-jsonschema \
            -i java-networknt-json-schema-validator \
          | bowtie summary --format json > data/bowtie-results.json
          echo "✅ Bowtie compliance data saved"

      - name: Fetch npm download stats
        run: npm run fetch

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: weekly snapshot $(date -u +%F)"
          git push